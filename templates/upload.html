<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Transfert de fichiers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Transfert de fichiers</h1>

  <!-- QR code dynamique -->
  <div class="qr">
    <p>Scanne ce QR code pour accéder au serveur :</p>
    <img src="data:image/png;base64,{{ qr_data }}" alt="QR Code">
    <p><strong>{{ server_url }}</strong></p>
  </div>

  <!-- Formulaire avec barre de progression -->
  <form id="uploadForm" method="post" enctype="multipart/form-data">
    <input type="file" name="file" multiple>
    <input type="submit" value="Envoyer">
  </form>
  <progress id="progressBar" value="0" max="100"></progress>

  <p><a href="/files">📂 Voir les fichiers disponibles sur le PC</a></p>

  <script>
  document.getElementById("uploadForm").onsubmit = function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    var xhr = new XMLHttpRequest();
    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable) {
        document.getElementById("progressBar").value = (e.loaded / e.total) * 100;
      }
    };
    xhr.onload = function() {
      alert("✅ Upload terminé !");
      document.getElementById("progressBar").value = 0;
    };
    xhr.open("POST", "/", true);
    xhr.send(formData);
  };
  </script>
</body>
</html>
